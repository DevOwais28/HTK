<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D32F2F"/>
      <stop offset="100%" style="stop-color:#B71C1C"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5722"/>
      <stop offset="100%" style="stop-color:#FF9800"/>
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>
  
  <!-- Inner border -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#FFCDD2" stroke-width="2"/>
  
  <!-- Flame icon at top -->
  <path d="M50 12 Q58 28 52 38 Q50 42 48 38 Q42 28 50 12" fill="url(#flameGrad)"/>
  <path d="M50 18 Q54 30 50 36 Q46 30 50 18" fill="#FFF3E0"/>
  
  <!-- HTK Text -->
  <text x="50" y="62" 
        text-anchor="middle" 
        font-family="Arial Black, Arial, sans-serif" 
        font-size="30" 
        font-weight="900"
        fill="#FFFFFF"
        letter-spacing="1">HTK</text>
  
  <!-- Hot Top Krispy text -->
  <text x="50" y="78" 
        text-anchor="middle" 
        font-family="Arial, sans-serif" 
        font-size="7" 
        fill="#FFCDD2"
        letter-spacing="1.5">HOT TOP KRISPY</text>
  
  <!-- Small burger bun at bottom -->
  <ellipse cx="50" cy="88" rx="16" ry="5" fill="#E8C4A0"/>
  <ellipse cx="50" cy="86" rx="14" ry="4" fill="#D4A574"/>
</svg>
